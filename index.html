<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000000; /* Black background color */
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 80px;
      background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent black header */
      transition: background-color 0.5s; /* Transition effect for the background color */
      z-index: 999; /* Ensure the header is on top of other elements */
    }

    header.transparent {
      background-color: rgba(0, 0, 0, 0); /* Transparent header */
    }

    /* Add some content for demonstration */
    section {
      height: 1500px;
      padding-top: 80px; /* Ensure content is below the fixed header */
      color: #ffffff;
    }
  </style>
</head>
<body>
  <header>
    <!-- Add your header content here -->
  </header>

  <section>
    <!-- Add your website content here -->
    <h2>Bruce Qu</h2>
    <p> Hi, I am an electrical engineering student at UCLA.</p>
  </section>

  <script>
    // JavaScript to handle the scrolling event and add/remove the "transparent" class
    window.addEventListener("scroll", function() {
      var header = document.querySelector("header");
      var scrollPosition = window.scrollY;

      if (scrollPosition > 0) {
        header.classList.add("transparent");
      } else {
        header.classList.remove("transparent");
      }
    });
  </script>
</body>
</html>
